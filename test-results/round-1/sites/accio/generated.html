<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accio-ai Design System Preview</title>
    <style>
        :root {
            /* Background Layers */
            --bg-surface: #ffffff;
            --bg-dim: #f4f4f4;

            /* Signal Colors */
            --signal-primary: #10b981;
            --signal-primary-hover: #059669;
            --signal-primary-light: #ecfdf5;

            /* Text Hierarchy */
            --text-primary: #222222;
            --text-secondary: #444444;
            --text-muted: #666666;
            --text-helper: #767676;
            --text-disabled: #767676;

            /* Typography */
            --font-family: "Alibaba_B2B_Sans", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;

            /* Spacing (Base: 4px) */
            --space-1: 4px;
            --space-2: 8px;
            --space-3: 12px;
            --space-4: 16px;
            --space-5: 20px;
            --space-6: 24px;
            --space-8: 32px;
            --space-12: 48px;

            /* Depth & Hierarchy */
            --radius-sm: 4px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --radius-full: 9999px;

            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.1);

            --border-default: 1px solid #dddddd;
            --border-focus: 2px solid var(--signal-primary);

            /* Motion */
            --motion-fast: 150ms;
            --motion-normal: 250ms;
            --motion-easing: cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-dim);
            color: var(--text-secondary);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 1320px;
            margin: 0 auto;
            padding: 0 var(--space-6);
        }

        /* 导航栏 */
        .navbar {
            background-color: var(--bg-surface);
            border-bottom: var(--border-default);
            padding: var(--space-3) 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar .container {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            text-decoration: none;
            letter-spacing: -0.5px;
        }

        .nav-links {
            display: flex;
            gap: var(--space-6);
        }

        .nav-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 16px;
            font-weight: 400;
            transition: color var(--motion-fast) var(--motion-easing);
        }

        .nav-link:hover {
            color: var(--text-primary);
        }

        .nav-link.active {
            color: var(--signal-primary);
            font-weight: 500;
        }

        /* 主内容区 */
        main {
            padding: var(--space-12) 0 var(--space-8);
        }

        /* 标题区域 */
        .hero-section {
            text-align: center;
            margin-bottom: var(--space-12);
        }

        .hero-title {
            font-size: 48px;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1.2;
            margin-bottom: var(--space-4);
        }

        .hero-subtitle {
            font-size: 18px;
            color: var(--text-muted);
            max-width: 600px;
            margin: 0 auto var(--space-8);
        }

        /* 卡片列表 */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: var(--space-6);
            margin-bottom: var(--space-8);
        }

        .card {
            background-color: var(--bg-surface);
            border-radius: var(--radius-md);
            border: var(--border-default);
            padding: var(--space-4);
            box-shadow: var(--shadow-md);
            transition: transform var(--motion-normal) var(--motion-easing),
                        box-shadow var(--motion-normal) var(--motion-easing);
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .card-title {
            font-size: 28px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: var(--space-2);
        }

        .card-text {
            font-size: 16px;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: var(--space-4);
        }

        .card-footer {
            display: flex;
            justify-content: flex-end;
            gap: var(--space-3);
        }

        /* 按钮 */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            height: 36px;
            padding: 0 var(--space-4);
            border-radius: var(--radius-md);
            font-family: var(--font-family);
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--motion-fast) var(--motion-easing);
            border: var(--border-default);
            background-color: var(--bg-surface);
            color: var(--text-secondary);
        }

        .btn:hover {
            background-color: var(--bg-dim);
            color: var(--text-primary);
            border-color: #ccc;
        }

        .btn:focus-visible {
            outline: var(--border-focus);
            outline-offset: 2px;
        }

        .btn:active {
            transform: translateY(1px);
            box-shadow: var(--shadow-sm);
        }

        .btn-primary {
            background-color: var(--signal-primary);
            color: white;
            border: none;
        }

        .btn-primary:hover {
            background-color: var(--signal-primary-hover);
            border-color: transparent;
        }

        .btn-primary:focus-visible {
            outline-color: var(--signal-primary);
        }

        .btn-ghost {
            background-color: transparent;
            border-color: transparent;
            color: var(--text-secondary);
        }

        .btn-ghost:hover {
            background-color: rgba(0, 0, 0, 0.03);
            border-color: transparent;
        }

        /* 输入框 */
        .form-group {
            margin-bottom: var(--space-4);
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: var(--space-2);
        }

        .form-input {
            width: 100%;
            height: 40px;
            padding: 0 var(--space-3);
            border-radius: var(--radius-md);
            border: var(--border-default);
            background-color: var(--bg-surface);
            color: var(--text-primary);
            font-size: 16px;
            font-family: var(--font-family);
            transition: all var(--motion-fast) var(--motion-easing);
        }

        .form-input::placeholder {
            color: var(--text-muted);
        }

        .form-input:focus {
            outline: var(--border-focus);
            outline-offset: 1px;
            border-color: var(--signal-primary);
        }

        .form-input:hover {
            border-color: #bbb;
        }

        /* 示例组件展示区 */
        .component-showcase {
            background-color: var(--bg-surface);
            border-radius: var(--radius-lg);
            border: var(--border-default);
            padding: var(--space-6);
            margin-top: var(--space-8);
        }

        .showcase-title {
            font-size: 30px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: var(--space-6);
            padding-bottom: var(--space-4);
            border-bottom: var(--border-default);
        }

        .button-row {
            display: flex;
            gap: var(--space-4);
            margin-bottom: var(--space-6);
            flex-wrap: wrap;
        }

        .input-demo {
            max-width: 400px;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="container">
            <a href="#" class="logo">Accio-ai</a>
            <div class="nav-links">
                <a href="#" class="nav-link">产品</a>
                <a href="#" class="nav-link active">文档</a>
                <a href="#" class="nav-link">定价</a>
                <a href="#" class="nav-link">关于我们</a>
            </div>
        </div>
    </nav>

    <!-- 主内容 -->
    <main>
        <div class="container">
            <!-- 标题区域 -->
            <section class="hero-section">
                <h1 class="hero-title">设计系统预览</h1>
                <p class="hero-subtitle">专业、清晰、高效的视觉语言，为B端工具场景打造可信赖的用户体验。</p>
            </section>

            <!-- 卡片列表 -->
            <div class="card-grid">
                <div class="card">
                    <h3 class="card-title">色彩系统</h3>
                    <p class="card-text">以清晰与聚焦为核心，背景采用无色的白与浅灰。文字层级明确，通过灰度的微妙变化构建信息优先级。</p>
                    <div class="card-footer">
                        <button class="btn btn-ghost">了解更多</button>
                        <button class="btn btn-primary">开始使用</button>
                    </div>
                </div>

                <div class="card">
                    <h3 class="card-title">排版层级</h3>
                    <p class="card-text">使用单一无衬线字体家族，确保专业感。字号从14px到48px形成明显阶梯，建立清晰的视觉层级。</p>
                    <div class="card-footer">
                        <button class="btn btn-ghost">了解更多</button>
                        <button class="btn btn-primary">开始使用</button>
                    </div>
                </div>

                <div class="card">
                    <h3 class="card-title">间距韵律</h3>
                    <p class="card-text">基于4px的倍数系统，创造一致而有节奏的留白。组件内部紧凑，组件之间保留呼吸感。</p>
                    <div class="card-footer">
                        <button class="btn btn-ghost">了解更多</button>
                        <button class="btn btn-primary">开始使用</button>
                    </div>
                </div>
            </div>

            <!-- 组件展示区 -->
            <section class="component-showcase">
                <h2 class="showcase-title">组件展示</h2>

                <!-- 按钮样式 -->
                <h3 style="font-size: 24px; font-weight: 600; color: var(--text-primary); margin-bottom: var(--space-4);">按钮样式</h3>
                <div class="button-row">
                    <button class="btn">默认按钮</button>
                    <button class="btn btn-primary">主要操作</button>
                    <button class="btn btn-ghost">幽灵按钮</button>
                    <button class="btn" disabled style="color: var(--text-disabled); background: var(--bg-dim); border-color: #eee;">禁用状态</button>
                </div>

                <!-- 输入框示例 -->
                <h3 style="font-size: 24px; font-weight: 600; color: var(--text-primary); margin-bottom: var(--space-4); margin-top: var(--space-6);">输入框示例</h3>
                <div class="input-demo">
                    <div class="form-group">
                        <label class="form-label" for="email">电子邮箱</label>
                        <input class="form-input" type="email" id="email" placeholder="请输入您的邮箱地址">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="search">搜索功能</label>
                        <input class="form-input" type="search" id="search" placeholder="输入关键词进行搜索">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="disabled">禁用输入框</label>
                        <input class="form-input" type="text" id="disabled" placeholder="此字段不可编辑" disabled style="color: var(--text-disabled); background: var(--bg-dim); border-color: #eee;">
                    </div>
                </div>
            </section>
        </div>
    </main>
</body>
</html>
