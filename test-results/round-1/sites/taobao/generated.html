<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taobao Design System Demo</title>
<style>
    /* Base & Layout */
    :root {
        /* Colors */
        --bg-page: #FFFFFF;
        --bg-surface: #EBEBEB;
        --signal-primary: #FF5000;
        --text-primary: #1F1F1F;
        --text-secondary: #7A7A7A;
        --text-disabled: #EBEBEB;

        /* Typography */
        --font-family: system-ui;

        /* Type Scale */
        --text-caption: 12px;
        --text-sm: 14px;
        --text-body: 16px;
        --text-heading: 18px;
        --text-display: 24px;

        /* Spacing */
        --space-xxs: 2px;
        --space-xs: 4px;
        --space-sm: 8px;
        --space-md: 12px;
        --space-base: 16px;
        --space-lg: 24px;
        --space-xl: 32px;
        --space-2xl: 48px;

        /* Depth & Hierarchy */
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --radius-full: 9999px;

        --shadow-subtle: 0px 1px 2px rgba(0,0,0,0.1);
        --shadow-card: 0px 4px 24px rgba(10,10,51,0.12), 0px 0px 8px rgba(0,0,0,0.04);
        --shadow-modal: 0px 8px 32px rgba(10,10,51,0.15), 0px 0px 12px rgba(0,0,0,0.06);
        --shadow-overlay: 0px 16px 48px rgba(10,10,51,0.2), 0px 0px 16px rgba(0,0,0,0.08);

        --border-subtle: 1px solid #E5E5E5;
        --border-default: 1px solid #EBEBEB;

        /* Motion */
        --motion-fast: 200ms ease-out;
    }

    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        font-family: var(--font-family);
        color: var(--text-primary);
        background-color: var(--bg-page);
        font-size: var(--text-body);
        line-height: 1.5;
    }

    .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 var(--space-lg);
    }

    /* Navigation */
    .nav {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: var(--space-md) 0;
        border-bottom: var(--border-subtle);
        background-color: var(--bg-page);
        box-shadow: var(--shadow-subtle);
        position: sticky;
        top: 0;
        z-index: 10;
    }

    .nav-logo {
        font-size: var(--text-heading);
        font-weight: 700;
        color: var(--signal-primary);
        margin: 0;
        text-decoration: none;
    }

    .nav-links {
        display: flex;
        gap: var(--space-lg);
        list-style: none;
        margin: 0;
        padding: 0;
    }

    .nav-link {
        color: var(--text-primary);
        text-decoration: none;
        font-size: var(--text-sm);
        font-weight: 400;
        transition: color var(--motion-fast);
        padding: var(--space-xs) 0;
    }

    .nav-link:hover,
    .nav-link.active {
        color: var(--signal-primary);
    }

    /* Hero Section */
    .hero {
        text-align: center;
        padding: var(--space-2xl) 0;
        background-color: var(--bg-page);
        margin-bottom: var(--space-xl);
    }

    .hero-title {
        font-size: var(--text-display);
        font-weight: 700;
        margin: 0 0 var(--space-base) 0;
        line-height: 1.2;
    }

    .hero-description {
        font-size: var(--text-body);
        color: var(--text-secondary);
        max-width: 600px;
        margin: 0 auto;
    }

    /* Grid for Cards */
    .grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: var(--space-lg);
        margin-bottom: var(--space-xl);
    }

    /* Cards */
    .card {
        background: var(--bg-surface);
        border-radius: var(--radius-md);
        padding: var(--space-base);
        box-shadow: var(--shadow-card);
        transition: transform var(--motion-fast), box-shadow var(--motion-fast);
    }

    .card:hover {
        transform: translateY(-2px);
        box-shadow: var(--shadow-modal);
    }

    .card-title {
        font-size: var(--text-heading);
        font-weight: 700;
        margin: 0 0 var(--space-sm) 0;
    }

    .card-description {
        font-size: var(--text-sm);
        color: var(--text-secondary);
        margin: 0;
    }

    /* Component Showcase Section */
    .components {
        margin-bottom: var(--space-xl);
        padding-top: var(--space-lg);
        border-top: var(--border-subtle);
    }

    .section-title {
        font-size: var(--text-heading);
        font-weight: 700;
        margin: 0 0 var(--space-lg) 0;
    }

    .button-group,
    .input-group {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-base);
        margin-bottom: var(--space-lg);
    }

    /* Buttons */
    .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: none;
        border-radius: 6px;
        height: 28px;
        padding: 0 12px;
        font-weight: 600;
        font-size: 14px;
        font-family: inherit;
        cursor: pointer;
        transition: background var(--motion-fast), box-shadow var(--motion-fast), transform var(--motion-fast), outline var(--motion-fast);
    }

    .btn-primary {
        background: var(--signal-primary);
        color: #FFFFFF;
    }

    .btn-primary:hover {
        background: #E04800;
        box-shadow: 0 2px 8px rgba(255, 80, 0, 0.3);
    }

    .btn-primary:focus-visible {
        outline: 2px solid var(--signal-primary);
        outline-offset: 2px;
    }

    .btn-primary:active {
        background: #C04000;
        transform: translateY(1px);
    }

    .btn-primary:disabled {
        background: var(--text-disabled);
        color: var(--text-secondary);
        cursor: not-allowed;
        box-shadow: none;
    }

    .btn-secondary {
        background: transparent;
        color: var(--text-primary);
        border: 1px solid var(--bg-surface);
    }

    .btn-secondary:hover {
        background: #F5F5F5;
    }

    .btn-secondary:focus-visible {
        outline: 2px solid var(--signal-primary);
        outline-offset: 2px;
    }

    .btn-secondary:active {
        transform: translateY(1px);
    }

    .btn-ghost {
        background: transparent;
        color: var(--signal-primary);
        border: none;
    }

    .btn-ghost:hover {
        background: rgba(255, 80, 0, 0.05);
    }

    .btn-ghost:focus-visible {
        outline: 2px solid var(--signal-primary);
        outline-offset: 2px;
    }

    .btn-ghost:active {
        transform: translateY(1px);
    }

    /* Inputs */
    .input {
        background: #FFFFFF;
        color: var(--text-primary);
        border: 1px solid var(--bg-surface);
        border-radius: var(--radius-sm);
        height: 36px;
        padding: 0 12px;
        font-size: 14px;
        font-family: inherit;
        transition: border-color var(--motion-fast), outline var(--motion-fast);
    }

    .input:hover {
        border-color: var(--text-secondary);
    }

    .input:focus {
        outline: 2px solid var(--signal-primary);
        outline-offset: 2px;
        border-color: var(--signal-primary);
    }

    .input:disabled {
        background: #F5F5F5;
        color: var(--text-secondary);
        border-color: #E5E5E5;
    }

    .input-label {
        display: block;
        font-size: var(--text-caption);
        color: var(--text-secondary);
        margin-bottom: var(--space-xs);
    }

    .input-wrapper {
        display: flex;
        flex-direction: column;
    }
</style>
</head>
<body>

    <!-- Navigation Bar -->
    <header class="container">
        <nav class="nav">
            <a href="#" class="nav-logo">TB</a>
            <ul class="nav-links">
                <li><a href="#" class="nav-link active">首页</a></li>
                <li><a href="#" class="nav-link">产品</a></li>
                <li><a href="#" class="nav-link">解决方案</a></li>
                <li><a href="#" class="nav-link">关于我们</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <!-- Hero Title Area -->
        <section class="hero">
            <h1 class="hero-title">高效、清晰的设计系统</h1>
            <p class="hero-description">以功能和效率为核心，通过克制的色彩、精确的间距和清晰的层级，构建冷静、可靠的专业界面。</p>
        </section>

        <!-- Card List -->
        <section class="grid">
            <article class="card">
                <h3 class="card-title">信号色策略</h3>
                <p class="card-description">橙色(#FF5000)被严格限制用作行动信号，只在最关键的操作和信息上出现，确保视觉焦点。</p>
            </article>
            <article class="card">
                <h3 class="card-title">阴影层级</h3>
                <p class="card-description">四级精心设计的阴影（subtle, card, modal, overlay）清晰地表达界面元素的物理深度关系。</p>
            </article>
            <article class="card">
                <h3 class="card-title">间距系统</h3>
                <p class="card-description">基于4px的基础单元，通过“呼吸在组件之间”的策略，创造明确的视觉结构和层次。</p>
            </article>
        </section>

        <!-- Buttons and Inputs Showcase -->
        <section class="components">
            <h2 class="section-title">组件示例</h2>

            <h3>按钮</h3>
            <div class="button-group">
                <button class="btn btn-primary">主要操作</button>
                <button class="btn btn-secondary">次要操作</button>
                <button class="btn btn-ghost">幽灵按钮</button>
                <button class="btn btn-primary" disabled>禁用状态</button>
            </div>

            <h3>输入框</h3>
            <div class="input-group">
                <div class="input-wrapper">
                    <label class="input-label">用户名</label>
                    <input type="text" class="input" placeholder="请输入用户名">
                </div>
                <div class="input-wrapper">
                    <label class="input-label">邮箱</label>
                    <input type="email" class="input" placeholder="example@email.com" disabled>
                </div>
            </div>
        </section>

    </main>

</body>
</html>
